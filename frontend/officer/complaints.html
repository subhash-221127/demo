<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityFix – My Complaints</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="officer.css" />
  <link rel="stylesheet" href="../mobile-enhance.css" />
</head>

<body>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <a href="../index.html" class="sidebar-logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"
          stroke-linecap="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
          <circle cx="12" cy="10" r="3" />
        </svg>
      </div>
      <span class="logo-text">City<span>Fix</span></span>
    </a>
    <nav class="sidebar-nav">
      <a href="complaints.html" class="sidebar-link active"><span class="icon">📋</span> My Complaints</a>
      <a href="profile.html" class="sidebar-link"><span class="icon">👤</span> My Profile</a>
    </nav>
    <!-- Logout removed from sidebar — use the topbar dropdown instead -->
  </aside>

  <div class="main">
    <header class="header">
      <div class="header-left">
      <button class="hamburger" onclick="openSidebar()" aria-label="Open menu"><span></span><span></span><span></span></button>
        <h1 class="page-title" id="topbar-title">My Complaints</h1>
        <span class="page-sub" id="topbar-sub">Loading…</span>
      </div>
      <div class="header-right">
        <!-- Dark mode toggle -->
        <button class="notif-btn" id="dark-toggle-btn" onclick="toggleOfficerTheme()" title="Toggle dark mode"
          style="font-size:1rem;margin-right:4px;">
          <span id="dark-toggle-icon">🌙</span>
        </button>
        <div style="position:relative;">
          <button class="profile-btn" id="user-btn" onclick="toggleUserMenu(event)">
            <div class="chip-avatar" id="avatar-initials">OF</div>
            <div class="profile-btn-info">
              <span class="profile-btn-name" id="topbar-username">Officer</span>
              <span class="profile-btn-role" id="topbar-level-role">Officer</span>
            </div>
            <i class="fa-solid fa-chevron-down profile-chevron"></i>
          </button>
          <div class="profile-dropdown" id="user-dropdown">
            <div class="dropdown-user-header">
              <div class="dropdown-user-row">
                <div class="dropdown-user-avatar" id="dropdown-initials">OF</div>
                <div>
                  <div class="dropdown-user-name" id="dropdown-name">Officer</div>
                  <div class="dropdown-user-email" id="dropdown-email">officer@cityfix.gov.in</div>
                </div>
              </div>
              <div class="dropdown-user-tags">
                <span class="dropdown-user-tag tag-role">Officer</span>
                <span class="dropdown-user-tag tag-dept" id="dropdown-dept">—</span>
              </div>
            </div>
            <div class="dropdown-items">
              <a href="profile.html" class="dropdown-item">
                <i class="fa-solid fa-user"></i> My Profile
              </a>
              <div class="dropdown-divider"></div>
              <a href="#" class="dropdown-item logout-item" onclick="handleLogout()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
              </a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="page-content">
      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="search-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input class="search-input" type="text" id="search-input" placeholder="Search by ID, title or location…"
            oninput="filterComplaints()" />
        </div>
        <select class="filter-select" id="filter-status" onchange="filterComplaints()">
          <option value="">All Status</option>
          <option value="assigned">Assigned</option>
          <option value="in_progress">In Progress</option>
          <option value="resolved">Resolved</option>
        </select>
        <select class="filter-select" id="filter-severity" onchange="filterComplaints()">
          <option value="">All Severity</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select class="filter-select" id="sort-by" onchange="filterComplaints()">
          <option value="">Sort By</option>
          <option value="time-recent">Time (Recent First)</option>
          <option value="time-oldest">Time (Oldest First)</option>
          <option value="sev-critical">Severity: Critical First</option>
          <option value="sev-high">Severity: High First</option>
          <option value="sev-medium">Severity: Medium First</option>
          <option value="sev-low">Severity: Low First</option>
        </select>
      </div>

      <!-- Mini Stats -->
      <div class="mini-stats">
        <div class="mini-stat">
          <div class="mini-stat-val" id="stat-total" style="color:var(--navy);">0</div>
          <div class="mini-stat-label">Total Assigned</div>
        </div>
        <div class="mini-stat" style="background:#eff6ff;border-color:rgba(59,130,246,0.2);">
          <div class="mini-stat-val" id="stat-assigned" style="color:var(--blue);">0</div>
          <div class="mini-stat-label">Assigned</div>
        </div>
        <div class="mini-stat" style="background:var(--amber-light);border-color:rgba(245,158,11,0.2);">
          <div class="mini-stat-val" id="stat-progress" style="color:var(--amber);">0</div>
          <div class="mini-stat-label">In Progress</div>
        </div>
        <div class="mini-stat" style="background:var(--green-light);border-color:rgba(34,197,94,0.2);">
          <div class="mini-stat-val" id="stat-resolved" style="color:var(--green);">0</div>
          <div class="mini-stat-label">Resolved</div>
        </div>
      </div>

      <div id="loading-state" style="display:none;"></div>
      <div id="error-state" style="display:none;text-align:center;padding:60px 20px;color:var(--red);">
        <i class="fa-solid fa-circle-exclamation" style="font-size:2rem;margin-bottom:12px;display:block;"></i>
        <span id="error-msg">Could not load complaints.</span>
      </div>

      <div id="complaint-list" class="complaint-list" style="display:none;"></div>
      <div id="empty-state" class="empty-state" style="display:none;">
        <div class="empty-icon"><i class="fa-solid fa-inbox" style="font-size:1.6rem;color:var(--slate-300);"></i></div>
        <h3>No complaints found</h3>
        <p>Adjust your filters or wait for new assignments</p>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <script src="officer.js"></script>
  <script>
    // Dark mode for officer portal
    (function () {
      const saved = localStorage.getItem('officer-theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      document.addEventListener('DOMContentLoaded', () => {
        const icon = document.getElementById('dark-toggle-icon');
        if (icon) icon.textContent = saved === 'dark' ? '☀️' : '🌙';
      });
    })();

    function toggleOfficerTheme() {
      const cur = document.documentElement.getAttribute('data-theme') || 'light';
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('officer-theme', next);
      const icon = document.getElementById('dark-toggle-icon');
      if (icon) icon.textContent = next === 'dark' ? '☀️' : '🌙';
    }
  </script>




<script>
// ── Sidebar ──
function openSidebar()  { document.getElementById('sidebar').classList.add('open');    document.getElementById('sidebarOverlay').classList.add('open');    document.body.style.overflow = 'hidden'; }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); document.body.style.overflow = ''; }
function toggleSidebar(){ document.getElementById('sidebar').classList.contains('open') ? closeSidebar() : openSidebar(); }
document.querySelectorAll('.sidebar-link').forEach(l => l.addEventListener('click', closeSidebar));
</script>
</body>

</html>
