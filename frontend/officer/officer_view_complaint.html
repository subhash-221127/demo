<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CityFix – Complaint Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="officer.css"/>
  <style>
    /* ── Page layout overrides for scrollable full page ── */
    body { overflow: auto; }
    .main { overflow-y: auto; }

    /* ══════════════════════════════════════
       LIQUID POUR TIMELINE
    ══════════════════════════════════════ */
    .flow-timeline { position: relative; padding: 8px 0 4px; }
    .flow-step { display: flex; gap: 20px; position: relative; }

    .flow-step:not(:last-child) .flow-pipe {
      position: absolute; left: 19px; top: 44px;
      width: 4px; bottom: 0;
      background: var(--slate-200); border-radius: 999px;
      z-index: 0; overflow: hidden;
    }
    .flow-step:not(:last-child) .flow-liquid {
      position: absolute; top: 0; left: 0; right: 0; height: 0%;
      border-radius: 999px; transition: height 0s;
      background: linear-gradient(to bottom, #16a34a 0%, #22c55e 60%, rgba(34,197,94,0.4) 100%);
    }
    .flow-step.liquid-done .flow-liquid { height: 100%; }
    .flow-step.liquid-active .flow-liquid {
      height: 55%;
      background: linear-gradient(to bottom, #16a34a 0%, #22c55e 55%, rgba(34,197,94,0.12) 100%);
      animation: pourDrip 2.8s ease-in-out infinite;
    }
    @keyframes pourDrip {
      0%   { height: 48%; }
      40%  { height: 62%; }
      70%  { height: 52%; }
      100% { height: 48%; }
    }
    .flow-dot {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; flex-shrink: 0;
      position: relative; z-index: 2;
      border: 3px solid var(--slate-200); background: #fff;
      transition: background 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
      opacity: 0; transform: scale(0.6);
    }
    .flow-step.dot-visible .flow-dot { opacity: 1; transform: scale(1); }
    .flow-step.dot-visible.liquid-done .flow-dot {
      background: var(--green); border-color: var(--green); color: #fff;
      box-shadow: 0 0 0 5px rgba(34,197,94,0.18);
    }
    .flow-step.dot-visible.liquid-active .flow-dot {
      background: var(--orange); border-color: var(--orange); color: #fff;
      box-shadow: 0 0 0 6px rgba(249,115,22,0.18);
      animation: dotPulse 2s infinite;
    }
    .flow-step.dot-visible.pending-step .flow-dot {
      background: #fff; border-color: var(--slate-200); color: var(--slate-400);
    }
    .flow-step.dot-visible.rejected-step .flow-dot {
      background: #ef4444; border-color: #ef4444; color: #fff;
      box-shadow: 0 0 0 5px rgba(239,68,68,0.18);
    }
    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 0 6px rgba(249,115,22,0.18); }
      50%       { box-shadow: 0 0 0 12px rgba(249,115,22,0.05); }
    }
    .flow-body {
      flex: 1; padding: 8px 0 32px;
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    .flow-step:last-child .flow-body { padding-bottom: 0; }
    .flow-step.dot-visible .flow-body { opacity: 1; transform: translateY(0); }
    .flow-title { font-size: 1rem; font-weight: 800; line-height: 1.2; }
    .flow-step.liquid-done .flow-title   { color: var(--slate-800); }
    .flow-step.liquid-active .flow-title { color: var(--orange); }
    .flow-step.pending-step .flow-title  { color: var(--slate-400); }
    .flow-desc { font-size: 0.82rem; color: var(--slate-500); margin-top: 4px; line-height: 1.5; }
    .flow-step.pending-step .flow-desc { color: var(--slate-400); }
    .flow-date {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.75rem; color: var(--slate-400); margin-top: 5px;
    }
    .flow-note {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.75rem; font-weight: 600; color: var(--navy);
      background: rgba(26,60,110,0.08); padding: 3px 10px;
      border-radius: 6px; margin-top: 6px;
    }

    /* ── Page structure ── */
    .detail-wrap { max-width: 920px; margin: 0 auto; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 0.85rem; font-weight: 700; color: var(--navy);
      padding: 8px 0; margin-bottom: 18px;
      background: none; border: none; cursor: pointer;
      font-family: var(--font); transition: gap 0.15s;
    }
    .back-btn:hover { gap: 10px; }

    /* ── Hero card ── */
    .detail-hero {
      background: #fff; border: 1px solid var(--slate-200);
      border-radius: 20px; padding: 28px 32px; margin-bottom: 16px;
      position: relative; overflow: hidden;
    }
    .detail-hero::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--navy), var(--orange));
    }
    .hero-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; margin-bottom: 20px;
    }
    .hero-id {
      font-family: monospace; font-size: 0.75rem; font-weight: 700;
      color: var(--navy); display: block; margin-bottom: 5px;
    }
    .hero-title { font-size: 1.5rem; font-weight: 900; color: var(--slate-800); margin-bottom: 10px; }
    .hero-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    .hero-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; padding-top: 18px;
      border-top: 1px solid var(--slate-100);
    }
    .hg-item { display: flex; flex-direction: column; gap: 3px; }
    .hg-label {
      font-size: 0.7rem; font-weight: 700; color: var(--slate-400);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .hg-val { font-size: 0.875rem; font-weight: 700; color: var(--slate-800); }

    /* ── Citizen strip ── */
    .citizen-strip {
      display: flex; align-items: center; gap: 14px;
      background: rgba(26,60,110,0.06); border: 1px solid rgba(26,60,110,0.12);
      border-radius: 14px; padding: 14px 18px; margin-bottom: 16px;
    }
    .citizen-av {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--navy), var(--navy-mid));
      color: #fff; font-weight: 800; font-size: 0.95rem;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .citizen-name { font-weight: 800; font-size: 0.95rem; color: var(--navy); }
    .citizen-meta { font-size: 0.78rem; color: var(--slate-500); margin-top: 3px; }
    .citizen-contacts {
      display: flex; gap: 14px; margin-top: 6px; flex-wrap: wrap;
    }
    .citizen-contacts a {
      font-size: 0.78rem; font-weight: 700; color: var(--navy);
      text-decoration: none; display: flex; align-items: center; gap: 5px;
    }
    .citizen-contacts a:hover { text-decoration: underline; }

    /* ── Two-column layout ── */
    .detail-cols {
      display: grid; grid-template-columns: 1fr 360px; gap: 16px; align-items: start;
    }
    .detail-col-left, .detail-col-right { display: flex; flex-direction: column; gap: 16px; }

    /* ── Info sections ── */
    .info-section {
      background: #fff; border: 1px solid var(--slate-200);
      border-radius: 16px; overflow: hidden;
    }
    .info-section-title {
      padding: 12px 18px;
      font-size: 0.75rem; font-weight: 800; color: var(--slate-500);
      text-transform: uppercase; letter-spacing: 0.08em;
      border-bottom: 1px solid var(--slate-100); background: var(--slate-50);
    }
    .info-section-body { padding: 4px 18px; }
    .info-row-detail {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--slate-100); font-size: 0.875rem;
    }
    .info-row-detail:last-child { border-bottom: none; }
    .info-row-detail .lbl { color: var(--slate-500); font-weight: 500; }
    .info-row-detail .val { font-weight: 700; text-align: right; max-width: 180px; }

    .desc-box {
      background: var(--slate-50); border-radius: 10px; padding: 14px 16px;
      font-size: 0.875rem; color: var(--slate-800); line-height: 1.7;
    }

    /* ── Comments ── */
    .comment-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
    .comment-item { background: var(--slate-50); border-radius: 10px; padding: 10px 14px; }
    .comment-meta { display: flex; gap: 8px; font-size: 0.72rem; color: var(--slate-400); margin-bottom: 4px; }
    .comment-meta strong { color: var(--slate-600); }
    .comment-text { font-size: 0.85rem; color: var(--slate-800); line-height: 1.5; }

    /* ── Evidence sections ── */
    .evidence-grid { display: flex; flex-direction: column; gap: 10px; padding: 14px 18px; }
    .evidence-link {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(26,60,110,0.06); border: 1.5px solid rgba(26,60,110,0.12);
      color: var(--navy); font-weight: 700; font-size: 0.85rem;
      padding: 10px 16px; border-radius: 10px; text-decoration: none;
      transition: background 0.2s;
    }
    .evidence-link:hover { background: rgba(26,60,110,0.12); }

    /* ── Action area (resolve / reject) ── */
    .action-panel {
      background: #fff; border: 1px solid var(--slate-200);
      border-radius: 16px; overflow: hidden;
    }
    .action-panel-title {
      padding: 14px 18px; font-size: 0.8rem; font-weight: 800;
      color: var(--slate-600); text-transform: uppercase; letter-spacing: 0.07em;
      border-bottom: 1px solid var(--slate-100); background: var(--slate-50);
      display: flex; align-items: center; gap: 8px;
    }
    .action-panel-body { padding: 18px; display: flex; flex-direction: column; gap: 12px; }

    .btn-full {
      width: 100%; padding: 12px 18px; border-radius: 12px;
      font-size: 0.875rem; font-weight: 700; border: none; cursor: pointer;
      font-family: var(--font); transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-full-primary { background: var(--orange); color: #fff; }
    .btn-full-primary:hover { background: #ea6c0a; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(249,115,22,0.35); }
    .btn-full-green { background: #22c55e; color: #fff; }
    .btn-full-green:hover { background: #16a34a; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(34,197,94,0.35); }
    .btn-full-red { background: #fee2e2; color: #dc2626; border: 1.5px solid #fecaca; }
    .btn-full-red:hover { background: #fecaca; }
    .btn-full-navy { background: rgba(26,60,110,0.08); color: var(--navy); border: 1.5px solid rgba(26,60,110,0.15); }
    .btn-full-navy:hover { background: rgba(26,60,110,0.15); }
    .btn-full:disabled { opacity: 0.55; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    .upload-area {
      border: 2px dashed var(--slate-200); border-radius: 12px;
      padding: 20px 16px; text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-area:hover { border-color: var(--navy); background: rgba(26,60,110,0.03); }
    .upload-area input { display: none; }
    .upload-label { font-size: 0.82rem; color: var(--slate-500); font-weight: 500; cursor: pointer; }
    .upload-label strong { color: var(--navy); }
    .upload-preview { margin-top: 8px; font-size: 0.78rem; color: var(--green); font-weight: 600; }

    .rejection-textarea {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      border: 1.5px solid var(--slate-200); background: var(--slate-50);
      font-family: var(--font); font-size: 0.875rem; color: var(--slate-800);
      resize: vertical; min-height: 80px; outline: none;
      transition: border-color 0.2s;
    }
    .rejection-textarea:focus { border-color: var(--navy); background: #fff; }

    .maps-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.8rem; font-weight: 700; color: var(--navy);
      text-decoration: none; background: rgba(26,60,110,0.07);
      padding: 6px 12px; border-radius: 8px; margin-top: 4px;
      transition: background 0.15s;
    }
    .maps-link:hover { background: rgba(26,60,110,0.14); }

    /* ── Status badge (page-level) ── */
    .badge-status {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: 700;
    }
    .badge-status.assigned    { background: #eff6ff; color: #2563eb; }
    .badge-status.in_progress { background: rgba(245,158,11,0.12); color: #b45309; }
    .badge-status.resolved    { background: rgba(34,197,94,0.1); color: #16a34a; }
    .badge-status.rejected    { background: #fef2f2; color: #dc2626; }
    .badge-status.pending     { background: #f1f5f9; color: #64748b; }

    .sev-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: 700;
    }
    .sev-badge.sev-critical { background: #fef2f2; color: #dc2626; }
    .sev-badge.sev-high     { background: #fff7ed; color: #c2410c; }
    .sev-badge.sev-medium   { background: #fefce8; color: #a16207; }
    .sev-badge.sev-low      { background: rgba(34,197,94,0.1); color: #16a34a; }
    .sev-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

    .resolved-banner {
      background: linear-gradient(135deg, rgba(34,197,94,0.08), rgba(22,163,74,0.06));
      border: 1.5px solid rgba(34,197,94,0.25); border-radius: 14px;
      padding: 16px 20px; display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .resolved-banner i { font-size: 1.4rem; color: #22c55e; flex-shrink: 0; }
    .resolved-banner-text { font-weight: 700; font-size: 0.9rem; color: #15803d; }
    .resolved-banner-sub  { font-size: 0.8rem; color: #16a34a; margin-top: 2px; }

    @media (max-width: 900px) {
      .detail-cols { grid-template-columns: 1fr; }
      .hero-grid   { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
  <link rel="stylesheet" href="../mobile-enhance.css" />
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
  <a href="../index.html" class="sidebar-logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
    </div>
    <span class="logo-text">City<span>Fix</span></span>
  </a>
  <nav class="sidebar-nav">
    <a href="complaints.html" class="sidebar-link active"><span class="icon">📋</span> My Complaints</a>
    <a href="profile.html"    class="sidebar-link"><span class="icon">👤</span> My Profile</a>
  </nav>
</aside>

<div class="main">
  <header class="header">
    <div class="header-left">
      <button class="hamburger" onclick="openSidebar()" aria-label="Open menu"><span></span><span></span><span></span></button>
      <h1 class="page-title">Complaint Detail</h1>
      <span class="page-sub" id="headerSub">Loading…</span>
    </div>
    <div class="header-right">
      <button class="theme-toggle-btn" onclick="toggleOfficerTheme()" title="Toggle dark mode">
        <span id="officer-theme-icon">🌙</span>
      </button>
      <div style="position:relative;">
        <button class="profile-btn" id="user-btn" onclick="toggleUserMenu(event)">
          <div class="chip-avatar" id="avatar-initials">OF</div>
          <div class="profile-btn-info">
            <span class="profile-btn-name" id="topbar-username">Officer</span>
            <span class="profile-btn-role">Officer</span>
          </div>
          <i class="fa-solid fa-chevron-down profile-chevron"></i>
        </button>
        <div class="profile-dropdown" id="user-dropdown">
          <div class="dropdown-user-header">
            <div class="dropdown-user-row">
              <div class="dropdown-user-avatar" id="dropdown-initials">OF</div>
              <div>
                <div class="dropdown-user-name" id="dropdown-name">Officer</div>
                <div class="dropdown-user-email" id="dropdown-email">officer@cityfix.gov.in</div>
              </div>
            </div>
            <div class="dropdown-user-tags">
              <span class="dropdown-user-tag tag-role">Officer</span>
              <span class="dropdown-user-tag tag-dept" id="dropdown-dept">—</span>
            </div>
          </div>
          <div class="dropdown-items">
            <a href="profile.html" class="dropdown-item"><i class="fa-solid fa-user"></i> My Profile</a>
            <div class="dropdown-divider"></div>
            <a href="#" class="dropdown-item logout-item" onclick="handleLogout()">
              <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="page-content">
    <div class="detail-wrap" id="detailWrap">
      <!-- populated by JS -->
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="officer.js"></script>
<script src="officer_view_complaint.js"></script>
<script>
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebarOverlay").classList.toggle("open");
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("open");
}
document.querySelectorAll(".sidebar-link").forEach(function(l){
  l.addEventListener("click", closeSidebar);
});
</script>

<script>
function openSidebar() {
  document.querySelector('.sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
</script>
</body>
</html>
