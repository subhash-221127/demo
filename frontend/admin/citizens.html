<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityFix Admin – Citizens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-layout">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <a href="dashboard.html" class="sidebar-logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
        </svg>
      </div>
      <span class="logo-text">City<span>Fix</span></span>
    </a>
    <nav class="sidebar-nav">
      <a href="dashboard.html"  class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
      <a href="complaints.html" class="sidebar-link"><span class="icon">📋</span> Complaints</a>
      <a href="officers.html"   class="sidebar-link"><span class="icon">👮</span> Officers</a>
      <a href="citizens.html"   class="sidebar-link active"><span class="icon">👥</span> Citizens</a>
      <a href="departments.html" class="sidebar-link"><span class="icon">🏢</span> Departments</a>
      <a href="hierarchy.html"  class="sidebar-link"><span class="icon">🏗️</span> Hierarchy</a>
    </nav>
</aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><button class="hamburger" onclick="toggleSidebar()" aria-label="Menu"><span></span><span></span><span></span></button>
        <h1>Citizens</h1>
        <span class="breadcrumb">Citizen Management</span>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">🌙</span></button>
        <div class="admin-profile" id="admin-profile" onclick="document.getElementById('profile-dropdown').classList.toggle('show')">
          <div class="admin-avatar" id="admin-avatar">AD</div>
          <div class="admin-info"><div class="name" id="admin-name">Admin User</div><div class="role">Administrator</div></div>
          <div class="profile-dropdown" id="profile-dropdown">
            <a href="profile.html">👤 My Profile</a>
            <a href="../login.html" onclick="doLogout(event)">🚪 Logout</a>
          </div>
        </div>
      </div>
    </header>

    <div class="page-content">
      <div class="filter-bar">
        <div class="search-box">
          <span>🔍</span>
          <input type="text" id="search-input" placeholder="Search by name or email…" oninput="applyFilter()" style="width:300px;" />
        </div>
        <div style="margin-left:auto;font-size:0.85rem;color:var(--text-secondary);font-weight:600;" id="total-label"></div>
      </div>

      <div class="section-card">
        <div class="section-card-header">
          <h3 id="citizens-count">👥 Citizens (0)</h3>
        </div>
        <div class="section-card-body">
          <div id="loading-msg" style="text-align:center;padding:40px;color:var(--text-secondary);">Loading citizens…</div>
          <table class="data-table" id="citizens-table" style="display:none;">
            <thead>
              <tr><th>Name</th><th>Email</th><th>Phone</th><th>Joined</th></tr>
            </thead>
            <tbody id="citizens-body"></tbody>
          </table>
          <div id="empty-msg" style="display:none;text-align:center;padding:48px 20px;">
            <div style="font-size:3rem;margin-bottom:12px;">🔍</div>
            <div style="font-weight:700;color:var(--text-primary);">No citizens found</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="theme.js"></script>
<script src="admin-auth.js"></script>
<script>
  var allCitizens = [];

  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  }

  function initials(name) {
    return (name||'').split(' ').filter(Boolean).map(function(w){ return w[0]; }).slice(0,2).join('').toUpperCase()||'?';
  }

  function goToCitizen(id) {
    window.location.href = 'citizen-detail.html?id=' + id;
  }

  function applyFilter() {
    var q = document.getElementById('search-input').value.toLowerCase().trim();
    var data = q ? allCitizens.filter(function(c){
      return (c.name||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q);
    }) : allCitizens;

    document.getElementById('citizens-count').textContent = '👥 Citizens (' + data.length + ')';

    if (!data.length) {
      document.getElementById('citizens-table').style.display = 'none';
      document.getElementById('empty-msg').style.display = 'block';
      return;
    }
    document.getElementById('empty-msg').style.display = 'none';
    document.getElementById('citizens-table').style.display = 'table';

    document.getElementById('citizens-body').innerHTML = data.map(function(c) {
      return '<tr data-id="' + c._id + '" class="citizen-row" style="cursor:pointer;">' +
        '<td><div style="display:flex;align-items:center;gap:10px;">' +
          '<div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1a3c6e,#2563eb);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:800;flex-shrink:0;">' + initials(c.name) + '</div>' +
          '<span style="font-weight:600;">' + c.name + '</span>' +
        '</div></td>' +
        '<td>' + (c.email||'—') + '</td>' +
        '<td>' + (c.phone||'—') + '</td>' +
        '<td>' + fmtDate(c.createdAt) + '</td>' +
      '</tr>';
    }).join('');
  }

  // Event delegation for row clicks
  document.getElementById('citizens-body') && document.addEventListener('click', function(e) {
    var row = e.target.closest('tr.citizen-row');
    if (row) goToCitizen(row.dataset.id);
  });

  async function loadCitizens() {
    try {
      var res = await fetch('/api/admin/citizens');
      if (!res.ok) throw new Error('Server error ' + res.status);
      allCitizens = await res.json();
      document.getElementById('loading-msg').style.display = 'none';
      document.getElementById('total-label').textContent = 'Total: ' + allCitizens.length;
      applyFilter();
    } catch(err) {
      document.getElementById('loading-msg').innerHTML = '<span style="color:#dc2626;">Failed to load citizens — ' + err.message + '</span>';
    }
  }

  document.addEventListener('click', function(e) {
    var p = document.getElementById('admin-profile');
    if (p && !p.contains(e.target)) document.getElementById('profile-dropdown').classList.remove('show');
  });

  loadCitizens();
</script>
<script>
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebarOverlay").classList.toggle("open");
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("open");
}
document.querySelectorAll(".sidebar-link").forEach(function(l){
  l.addEventListener("click", closeSidebar);
});
</script>

<script>
function openSidebar() {
  document.querySelector('.sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
</script>
</body>
</html>
