<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityFix Admin – Citizen Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="admin.css" />
  <style>
    /* Hero */
    .citizen-hero {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: var(--radius); overflow: hidden; margin-bottom: 20px;
    }
    .hero-banner {
      height: 72px;
      background: linear-gradient(135deg, #0f2346 0%, #1a3c6e 55%, #f97316 100%);
    }
    .hero-body {
      padding: 0 28px 24px;
      display: flex; align-items: flex-end; gap: 18px;
    }
    .cit-avatar {
      width: 78px; height: 78px; border-radius: 50%;
      background: linear-gradient(135deg, #1a3c6e, #2563eb);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; font-weight: 800;
      border: 4px solid var(--card); margin-top: -39px; flex-shrink: 0;
      box-shadow: 0 6px 20px rgba(26,60,110,0.25);
    }
    .hero-text { padding-top: 10px; flex: 1; min-width: 0; }
    .hero-text h2 { font-size: 1.4rem; font-weight: 900; color: var(--text-primary); margin-bottom: 3px; }
    .hero-text .sub { font-size: 0.83rem; color: var(--text-secondary); margin-bottom: 10px; }
    .hero-chips { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--input-bg); border: 1px solid var(--card-border);
      border-radius: 20px; padding: 4px 11px;
      font-size: 0.76rem; font-weight: 600; color: var(--text-secondary);
    }

    /* Horizontal stat row */
    .stat-row {
      display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .stat-pill {
      flex: 1; min-width: 110px;
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: 14px; padding: 16px 18px;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      position: relative; overflow: hidden;
    }
    .stat-pill::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .stat-pill.blue::after   { background: #3b82f6; }
    .stat-pill.orange::after { background: #f97316; }
    .stat-pill.green::after  { background: #22c55e; }
    .stat-pill .num { font-size: 1.8rem; font-weight: 900; line-height: 1; margin-bottom: 5px; }
    .stat-pill.blue   .num { color: #3b82f6; }
    .stat-pill.orange .num { color: #f97316; }
    .stat-pill.green  .num { color: #22c55e; }
    .stat-pill .lbl { font-size: 0.72rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }

    /* Danger zone */
    .danger-zone {
      background: #fff1f2; border: 1.5px solid #fda4af;
      border-radius: var(--radius); padding: 20px 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap; margin-top: 8px;
    }
    .danger-text h4 { color: #be123c; font-size: 0.95rem; margin-bottom: 3px; }
    .danger-text p  { font-size: 0.82rem; color: var(--text-secondary); margin: 0; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      background: #1a3c6e; color: #fff; padding: 14px 20px;
      border-radius: 12px; font-weight: 600; font-size: 0.9rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      transform: translateY(80px); opacity: 0; transition: transform 0.3s, opacity 0.3s;
    }
    .toast.show    { transform: translateY(0); opacity: 1; }
    .toast.success { background: #16a34a; }
    .toast.error   { background: #dc2626; }

    @media(max-width:700px){ .stat-row { flex-direction:column; } }
  </style>
  <link rel="stylesheet" href="../mobile-enhance.css" />
</head>
<body>
<div class="admin-layout">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <a href="dashboard.html" class="sidebar-logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
        </svg>
      </div>
      <span class="logo-text">City<span>Fix</span></span>
    </a>
    <nav class="sidebar-nav">
      <a href="dashboard.html"  class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
      <a href="complaints.html" class="sidebar-link"><span class="icon">📋</span> Complaints</a>
      <a href="officers.html"   class="sidebar-link"><span class="icon">👮</span> Officers</a>
      <a href="citizens.html"   class="sidebar-link active"><span class="icon">👥</span> Citizens</a>
      <a href="departments.html" class="sidebar-link"><span class="icon">🏢</span> Departments</a>
      <a href="hierarchy.html"  class="sidebar-link"><span class="icon">🏗️</span> Hierarchy</a>
    </nav>
</aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><button class="hamburger" onclick="toggleSidebar()" aria-label="Menu"><span></span><span></span><span></span></button>
        <h1>Citizen Profile</h1>
        <span class="breadcrumb" id="breadcrumb">Loading…</span>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">🌙</span></button>
        <div class="admin-profile" id="admin-profile" onclick="document.getElementById('profile-dropdown').classList.toggle('show')">
          <div class="admin-avatar" id="admin-avatar">AD</div>
          <div class="admin-info"><div class="name" id="admin-name">Admin User</div><div class="role">Administrator</div></div>
          <div class="profile-dropdown" id="profile-dropdown">
            <a href="profile.html">👤 My Profile</a>
            <a href="../login.html" onclick="doLogout(event)">🚪 Logout</a>
          </div>
        </div>
      </div>
    </header>
    <div class="page-content" id="page-content">
      <div style="text-align:center;padding:80px 20px;color:var(--text-secondary);">Loading citizen…</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="theme.js"></script>
<script src="admin-auth.js"></script>
<script>
  var citizenId  = new URLSearchParams(window.location.search).get('id');
  var citizen    = null;
  var complaints = [];

  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (type||'success');
    setTimeout(function(){ t.classList.remove('show'); }, 3500);
  }

  function initials(name) {
    return (name||'').split(' ').filter(Boolean).map(function(w){ return w[0]; }).slice(0,2).join('').toUpperCase()||'?';
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  }

  function statusBadge(s) {
    var cls   = { pending:'pending', assigned:'in-progress', in_progress:'in-progress', resolved:'resolved', rejected:'rejected' };
    var label = { pending:'Pending', assigned:'Assigned', in_progress:'In Progress', resolved:'Resolved', rejected:'Rejected' };
    return '<span class="status-badge ' + (cls[s]||s) + '">' + (label[s]||s) + '</span>';
  }

  window.deleteCitizen = async function() {
    if (!confirm('Permanently delete this citizen account?\n\nThis cannot be undone.')) return;
    var btn = document.getElementById('delete-btn');
    btn.disabled = true; btn.textContent = 'Deleting…';
    try {
      var res  = await fetch('/api/admin/citizens/' + citizenId, { method:'DELETE' });
      var data = await res.json();
      if (res.ok) {
        showToast('Citizen account deleted.', 'success');
        setTimeout(function(){ window.location.href = 'citizens.html'; }, 1200);
      } else {
        showToast(data.message || 'Failed to delete.', 'error');
        btn.disabled = false; btn.textContent = 'Delete Account';
      }
    } catch(e) {
      showToast('Something went wrong. Please try again.', 'error');
      btn.disabled = false; btn.textContent = 'Delete Account';
    }
  };

  function render() {
    var c        = citizen;
    var cs       = complaints;
    var total    = cs.length;
    var resolved = cs.filter(function(x){ return x.status === 'resolved'; }).length;
    var pending  = cs.filter(function(x){ return x.status === 'pending' || x.status === 'assigned' || x.status === 'in_progress'; }).length;

    document.getElementById('breadcrumb').textContent = c.name + ' — Citizen Profile';

    var rows = cs.length
      ? cs.map(function(x){
          return '<tr data-id="' + x._id + '" class="complaint-row" style="cursor:pointer;">' +
            '<td><strong>' + (x.complaintId||'—') + '</strong></td>' +
            '<td>' + x.title + '</td>' +
            '<td>' + (x.department||'—') + '</td>' +
            '<td>' + statusBadge(x.status) + '</td>' +
            '<td>' + fmtDate(x.createdAt) + '</td>' +
          '</tr>';
        }).join('')
      : '<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-secondary);">No complaints filed yet</td></tr>';

    document.getElementById('page-content').innerHTML =
      '<a href="citizens.html" class="btn btn-outline btn-sm" style="margin-bottom:20px;">← Back to Citizens</a>' +

      // Hero card
      '<div class="citizen-hero">' +
        '<div class="hero-banner"></div>' +
        '<div class="hero-body">' +
          '<div class="cit-avatar">' + initials(c.name) + '</div>' +
          '<div class="hero-text">' +
            '<h2>' + c.name + '</h2>' +
            '<div class="sub">Registered citizen · Joined ' + fmtDate(c.createdAt) + '</div>' +
            '<div class="hero-chips">' +
              '<span class="status-badge active">Active</span>' +
              '<span class="chip">📧 ' + (c.email||'—') + '</span>' +
              (c.phone ? '<span class="chip">📞 ' + c.phone + '</span>' : '') +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +

      // 3 stat pills
      '<div class="stat-row">' +
        '<div class="stat-pill blue"><div class="num">' + total + '</div><div class="lbl">Total Complaints</div></div>' +
        '<div class="stat-pill orange"><div class="num">' + pending + '</div><div class="lbl">Pending / Active</div></div>' +
        '<div class="stat-pill green"><div class="num">' + resolved + '</div><div class="lbl">Resolved</div></div>' +
      '</div>' +

      // Info cards
      '<div class="detail-grid" style="margin-bottom:20px;">' +
        '<div class="info-card"><h4>📞 Contact Information</h4>' +
          '<div class="info-row"><span class="info-label">Email</span><span class="info-value">' + (c.email||'—') + '</span></div>' +
          '<div class="info-row"><span class="info-label">Phone</span><span class="info-value">' + (c.phone||'—') + '</span></div>' +
          '<div class="info-row"><span class="info-label">Address</span><span class="info-value">' + (c.address||'—') + '</span></div>' +
        '</div>' +
        '<div class="info-card"><h4>🆔 Account Details</h4>' +
          '<div class="info-row"><span class="info-label">Account ID</span><span class="info-value" style="font-size:0.78rem;color:#2563eb;font-weight:700;word-break:break-all;">' + c._id + '</span></div>' +
          '<div class="info-row"><span class="info-label">Joined On</span><span class="info-value">' + fmtDate(c.createdAt) + '</span></div>' +
          '<div class="info-row"><span class="info-label">Status</span><span class="info-value"><span class="status-badge active">Active</span></span></div>' +
        '</div>' +
      '</div>' +

      // Complaints table
      '<div class="section-card" style="margin-bottom:20px;" id="complaints-section">' +
        '<div class="section-card-header"><h3>📋 Complaints (' + total + ')</h3></div>' +
        '<div class="section-card-body">' +
          '<table class="data-table"><thead><tr>' +
            '<th>Complaint ID</th><th>Title</th><th>Department</th><th>Status</th><th>Filed On</th>' +
          '</tr></thead><tbody>' + rows + '</tbody></table>' +
        '</div>' +
      '</div>' +

      // Danger zone — delete only
      '<div class="danger-zone">' +
        '<div class="danger-text"><h4>🗑 Delete Account</h4><p>Permanently removes this citizen account. Their complaints remain in the database.</p></div>' +
        '<button class="btn btn-danger" id="delete-btn" onclick="deleteCitizen()">Delete Account</button>' +
      '</div>';

    // Event delegation for complaint rows
    document.getElementById('complaints-section').addEventListener('click', function(e) {
      var row = e.target.closest('tr.complaint-row');
      if (row) window.location.href = 'complaint-detail.html?id=' + row.dataset.id;
    });
  }

  async function init() {
    if (!citizenId) {
      document.getElementById('page-content').innerHTML =
        '<div style="text-align:center;padding:80px 20px;"><h2>No citizen ID provided.</h2>' +
        '<a href="citizens.html" class="btn btn-primary" style="margin-top:16px;">← Back to Citizens</a></div>';
      return;
    }
    try {
      var r1 = await fetch('/api/admin/citizens/' + citizenId);
      var r2 = await fetch('/api/admin/citizens/' + citizenId + '/complaints');

      var d1 = await r1.json();
      var d2 = await r2.json();

      if (!r1.ok) throw new Error(d1.message || 'Citizen not found.');
      if (!r2.ok) throw new Error(d2.message || 'Failed to load complaints.');

      citizen    = d1;
      complaints = Array.isArray(d2) ? d2 : [];
      render();
    } catch(err) {
      document.getElementById('page-content').innerHTML =
        '<div style="text-align:center;padding:80px 20px;">' +
        '<div style="font-size:4rem;margin-bottom:16px;">❌</div>' +
        '<h2>Failed to Load</h2>' +
        '<p style="color:var(--text-secondary);margin-bottom:20px;">' + err.message + '</p>' +
        '<a href="citizens.html" class="btn btn-primary">← Back to Citizens</a></div>';
    }
  }

  document.addEventListener('click', function(e) {
    var p = document.getElementById('admin-profile');
    if (p && !p.contains(e.target)) document.getElementById('profile-dropdown').classList.remove('show');
  });

  init();
</script>




<script>
// ── Sidebar (single clean implementation) ──
function openSidebar()  { document.getElementById('sidebar').classList.add('open');    document.getElementById('sidebarOverlay').classList.add('open');    document.body.style.overflow = 'hidden'; }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); document.body.style.overflow = ''; }
function toggleSidebar(){ document.getElementById('sidebar').classList.contains('open') ? closeSidebar() : openSidebar(); }
document.querySelectorAll('.sidebar-link').forEach(l => l.addEventListener('click', closeSidebar));
</script>

</body>
</html>
